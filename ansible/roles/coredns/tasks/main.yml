---
- name: Verify supported OS family
  fail:
    msg: >-
      Unsupported OS family '{{ ansible_os_family }}' on {{ inventory_hostname }}.
      This role requires a Debian-based system (Ubuntu, Debian).
  when: ansible_os_family != "Debian"

- name: Create CoreDNS directory structure
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/coredns
    - /opt/coredns/zones

- name: Deploy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/coredns/docker-compose.yml
    mode: "0644"
  notify: Restart CoreDNS

- name: Deploy CoreDNS Corefile
  template:
    src: Corefile.j2
    dest: /opt/coredns/Corefile
    mode: "0644"
  notify: Restart CoreDNS

- name: Pull CoreDNS Docker image
  command: docker compose -f /opt/coredns/docker-compose.yml pull
  changed_when: false

- name: Start CoreDNS
  command: docker compose -f /opt/coredns/docker-compose.yml up -d
  changed_when: false

- name: Install systemd unit for CoreDNS
  copy:
    dest: /etc/systemd/system/coredns.service
    content: |
      [Unit]
      Description=CoreDNS (authoritative DNS backend)
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/coredns
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=120

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Enable coredns systemd unit

- name: Flush handlers
  meta: flush_handlers
