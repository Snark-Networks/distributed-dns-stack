---
# ─── Pre-flight ───────────────────────────────────────────────────────────────

- name: Verify supported OS family
  fail:
    msg: >-
      Unsupported OS family '{{ ansible_os_family }}' on {{ inventory_hostname }}.
      This role requires a Debian-based system (Ubuntu, Debian).
  when: ansible_os_family != "Debian"

# ─── systemd-resolved ────────────────────────────────────────────────────────
# Disable systemd-resolved stub listener so dnsdist can bind port 53.
# Only acts when systemd-resolved is present and active on this host —
# safe on minimal installs, Debian, and other OSes that don't run it.

- name: Gather service facts
  service_facts:

- name: Stop and disable systemd-resolved
  # Use systemctl CLI directly — the systemd module communicates via D-Bus/polkit,
  # which blocks non-interactive sessions even as root on Ubuntu 24.04.
  command: systemctl disable --now systemd-resolved
  when:
    - "'systemd-resolved.service' in ansible_facts.services"
    - >-
      ansible_facts.services['systemd-resolved.service']['state'] == 'running' or
      ansible_facts.services['systemd-resolved.service']['status'] == 'enabled'
  changed_when: true

- name: Remove symlink /etc/resolv.conf (managed by systemd-resolved)
  file:
    path: /etc/resolv.conf
    state: absent
  when: "'127.0.0.53' in (ansible_facts['dns']['nameservers'] | default([]))"

- name: Write static /etc/resolv.conf with public resolvers
  # The server needs to resolve external names for package installs and Docker pulls.
  # We use public resolvers since this server is authoritative-only, not recursive.
  copy:
    dest: /etc/resolv.conf
    content: |
      # Static resolv.conf — systemd-resolved is disabled on this DNS server.
      # Edit this file to change upstream resolvers for OS-level DNS.
      nameserver 1.1.1.1
      nameserver 8.8.8.8
      nameserver 2606:4700:4700::1111
      options edns0 trust-ad
    mode: "0644"
    force: false   # don't overwrite if admin customized it

# ─── Docker prerequisites ────────────────────────────────────────────────────

- name: Install prerequisite packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present
    update_cache: yes

- name: Create Docker apt keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Get system architecture
  command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Get Ubuntu codename
  command: lsb_release -cs
  register: ubuntu_codename
  changed_when: false

- name: Add Docker apt repository
  apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable
    state: present
    filename: docker
    update_cache: yes

- name: Install Docker CE and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Configure Docker daemon (IPv6 support, log rotation)
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "3"
        },
        "ipv6": true,
        "fixed-cidr-v6": "fd00:db8::/64",
        "ip6tables": true
      }
    mode: "0644"
  notify: Restart Docker

- name: Ensure Docker service is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Flush handlers to apply daemon config before continuing
  meta: flush_handlers
