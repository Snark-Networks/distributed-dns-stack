---
- name: Verify supported OS family
  fail:
    msg: >-
      Unsupported OS family '{{ ansible_os_family }}' on {{ inventory_hostname }}.
      This role requires a Debian-based system (Ubuntu, Debian).
  when: ansible_os_family != "Debian"

- name: Verify CoreDNS backends are resolvable for this host
  fail:
    msg: >-
      No CoreDNS backends found for {{ inventory_hostname }}.
      Either add this host to a site_* inventory group alongside coredns_servers hosts,
      or ensure [coredns_servers] is populated (used as a global fallback when no site group exists).
  when: >-
    (group_names | select('match', '^site_') | list |
     map('extract', groups) | flatten |
     intersect(groups['coredns_servers'] | default([])) | length == 0)
    and
    (groups['coredns_servers'] | default([]) | length == 0)

- name: Create dnsdist directory
  file:
    path: /opt/dnsdist
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /opt/dnsdist/docker-compose.yml
    mode: "0644"
  notify: Restart dnsdist

- name: Deploy dnsdist configuration
  template:
    src: dnsdist.conf.j2
    dest: /opt/dnsdist/dnsdist.conf
    mode: "0644"
  notify: Restart dnsdist

- name: Install dnsutils (provides dig for manual testing)
  apt:
    name: dnsutils
    state: present

- name: Pull dnsdist Docker image
  command: docker compose -f /opt/dnsdist/docker-compose.yml pull
  changed_when: false

- name: Start dnsdist
  command: docker compose -f /opt/dnsdist/docker-compose.yml up -d
  changed_when: false

- name: Install systemd unit for dnsdist
  copy:
    dest: /etc/systemd/system/dnsdist.service
    content: |
      [Unit]
      Description=dnsdist (DNS load balancer / frontend)
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/dnsdist
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      TimeoutStartSec=120

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Enable dnsdist systemd unit

- name: Flush handlers
  meta: flush_handlers
