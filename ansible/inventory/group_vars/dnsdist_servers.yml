---
# Variables for dnsdist frontend servers.
#
# ── Address and ACL ──────────────────────────────────────────────────────────

# Address dnsdist binds its web/metrics endpoint to.
# Default: 0.0.0.0 — bind on all interfaces so a separate monitoring server
# can scrape metrics. Change to 127.0.0.1 if monitoring is co-located.
dnsdist_webserver_address: "0.0.0.0:8083"

# IPs/ranges allowed to access the dnsdist web interface.
# Add your monitoring server's IP here.
dnsdist_webserver_acl: "127.0.0.0/8, ::1/128"

# ── CoreDNS backend config ────────────────────────────────────────────────────

# Port CoreDNS backends listen on. Matches coredns_dns_port in coredns_servers.yml.
coredns_dns_port: 5300

# Zone used for CoreDNS health checks (any zone CoreDNS actually serves).
# Update this to a zone name your CoreDNS servers serve.
dnsdist_health_check_zone: "2.0.192.in-addr.arpa."

# ── Log shipping ──────────────────────────────────────────────────────────────

# Loki push endpoint for Promtail running on this dnsdist server.
# Use http://127.0.0.1:3100/loki/api/v1/push when monitoring is co-located.
# Use http://<monitoring-server-ip>:3100/loki/api/v1/push for a separate server.
loki_push_url: "http://127.0.0.1:3100/loki/api/v1/push"

# ── Prometheus scrape target ──────────────────────────────────────────────────

# IP address Prometheus uses to scrape the dnsdist metrics endpoint on this host.
# Default: 127.0.0.1 — correct when monitoring runs on the same host.
# For split deployments: override per-host in hosts.yml with this server's actual IP.
metrics_scrape_address: "127.0.0.1"
