---
# Server inventory — define your DNS tiers, sites, and monitoring server here.
#
# ── How it works ─────────────────────────────────────────────────────────────
#
# Three tier groups define the role of each host:
#   dnsdist_servers   — public-facing DNS frontend (port 53)
#   coredns_servers   — authoritative DNS backend (port 5300)
#   monitoring_servers — Prometheus + Loki + Grafana
#
# Site groups (site_*) link each dnsdist frontend to its local CoreDNS backends.
# A dnsdist host uses only the coredns_servers in its own site_* group as backends.
# If a host has no site_* group, all coredns_servers are used (global fallback).
#
# ── Deployment topologies ────────────────────────────────────────────────────
#
#   All-in-one (single host for everything):
#     Put the same host in all groups. No site_* group needed — dnsdist will use
#     127.0.0.1 automatically since it shares an IP with its CoreDNS backend.
#
#   Single site (dnsdist and CoreDNS on separate hosts):
#     Put both in one site_* group. dnsdist uses only its site's CoreDNS backends.
#
#   Multiple sites / geographic deployments:
#     Create one site_* group per location. Each dnsdist gets backends only from
#     its own site. Add hosts to scale either tier independently within a site.
#
# ── Per-host variables ────────────────────────────────────────────────────────
#   metrics_scrape_address  — IP Prometheus uses to scrape this host's metrics.
#                             Default: 127.0.0.1 (correct for all-in-one).
#                             Set to ansible_host for split/remote deployments.

all:
  children:

    # ── Tier groups ───────────────────────────────────────────────────────────
    # These define what role each host plays. Every host must be in at least
    # one tier group. A host may be in multiple groups (e.g. for all-in-one).

    dnsdist_servers:
      hosts:
        dnsdist-us-east:
          ansible_host: 192.0.2.1
          ansible_user: root
          metrics_scrape_address: "192.0.2.1"
        # dnsdist-eu-west:
        #   ansible_host: 192.0.2.10
        #   ansible_user: root
        #   metrics_scrape_address: "192.0.2.10"

    coredns_servers:
      hosts:
        coredns-us-east-1:
          ansible_host: 192.0.2.2
          ansible_user: root
          metrics_scrape_address: "192.0.2.2"
        coredns-us-east-2:
          ansible_host: 192.0.2.3
          ansible_user: root
          metrics_scrape_address: "192.0.2.3"
        # coredns-eu-west-1:
        #   ansible_host: 192.0.2.11
        #   ansible_user: root
        #   metrics_scrape_address: "192.0.2.11"

    monitoring_servers:
      hosts:
        monitoring01:
          ansible_host: 192.0.2.20
          ansible_user: root

    # ── Site groups ───────────────────────────────────────────────────────────
    # Each site_* group links a dnsdist frontend to its local CoreDNS backends.
    # dnsdist generates its backend list from the coredns_servers in its site group.
    # Firewall: dnsdist hosts must reach their site's CoreDNS hosts on TCP+UDP 5300.

    site_us_east:
      hosts:
        dnsdist-us-east:
        coredns-us-east-1:
        coredns-us-east-2:

    # site_eu_west:
    #   hosts:
    #     dnsdist-eu-west:
    #     coredns-eu-west-1:
